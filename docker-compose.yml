services:
  postgres:
    image: postgres:16-alpine
    container_name: suite_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: suite_prestamos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: suite_adminer
    restart: always
    ports:
      - '8080:8080'

volumes:
  postgres_data:
